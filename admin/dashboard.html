<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard — Mark Decena</title>
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    /* ── Layout ── */
    html, body { height: 100%; overflow: hidden; }
    body { display: flex; flex-direction: column; }

    /* ── Top bar ── */
    .topbar {
      height: 56px; flex-shrink: 0;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px; z-index: 100;
    }
    .topbar-brand { font-size: 1.1rem; font-weight: 800; letter-spacing: -.03em; display: flex; align-items: center; gap: 10px; }
    .topbar-brand .dot { color: var(--accent); }
    .topbar-badge {
      font-size: .68rem; font-weight: 700; letter-spacing: .06em; text-transform: uppercase;
      background: var(--accent-glow); border: 1px solid rgba(124,111,234,.35);
      color: var(--accent); padding: 3px 10px; border-radius: 100px;
    }
    .topbar-right { display: flex; align-items: center; gap: 12px; }
    .topbar-user { font-size: .85rem; color: var(--text-secondary); }
    .topbar-user span { color: var(--text-primary); font-weight: 600; }
    .btn-logout {
      font-size: .8rem; font-weight: 600; padding: 6px 14px;
      background: transparent; border: 1px solid var(--border);
      color: var(--text-secondary); border-radius: var(--radius-sm);
      cursor: pointer; transition: all var(--ease-fast);
    }
    .btn-logout:hover { border-color: #ef4444; color: #f87171; background: rgba(239,68,68,.08); }

    /* ── Main shell ── */
    .shell { display: flex; flex: 1; overflow: hidden; }

    /* ── Sidebar nav ── */
    .sidebar {
      width: 200px; flex-shrink: 0;
      background: var(--bg-secondary);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      padding: 16px 10px;
      gap: 4px;
    }
    .sidebar-section {
      font-size: .67rem; font-weight: 700; letter-spacing: .1em;
      text-transform: uppercase; color: var(--text-muted);
      padding: 6px 10px 4px; margin-top: 8px;
    }
    .sidebar-link {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 12px; border-radius: var(--radius-sm);
      font-size: .88rem; font-weight: 500; color: var(--text-secondary);
      cursor: pointer; transition: all var(--ease-fast); border: none;
      background: none; width: 100%; text-align: left; text-decoration: none;
    }
    .sidebar-link:hover { background: rgba(255,255,255,.05); color: var(--text-primary); }
    .sidebar-link.active { background: var(--accent-glow); color: var(--accent); }
    .sidebar-link svg { width: 16px; height: 16px; flex-shrink: 0; }
    .sidebar-badge {
      margin-left: auto; background: var(--accent);
      color: #fff; font-size: .68rem; font-weight: 700;
      min-width: 18px; height: 18px; border-radius: 100px;
      display: flex; align-items: center; justify-content: center;
      padding: 0 5px;
    }
    .sidebar-badge.hidden { display: none; }

    /* ── Content area ── */
    .content { flex: 1; display: flex; overflow: hidden; }

    /* ── Inbox two-pane ── */
    .inbox-pane {
      display: flex; width: 100%; overflow: hidden;
    }

    /* Message list */
    .msg-list {
      width: 320px; flex-shrink: 0;
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    .msg-list-header {
      padding: 16px 18px 12px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .msg-list-header h3 { font-size: 1rem; }
    .msg-list-header .msg-count { font-size: .78rem; color: var(--text-muted); }
    .msg-list-body { flex: 1; overflow-y: auto; }
    .msg-list-body::-webkit-scrollbar { width: 4px; }
    .msg-list-body::-webkit-scrollbar-track { background: transparent; }
    .msg-list-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .msg-item {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background var(--ease-fast);
      position: relative;
    }
    .msg-item:hover { background: rgba(255,255,255,.03); }
    .msg-item.selected { background: var(--accent-glow); border-left: 2px solid var(--accent); }
    .msg-item.unread .msg-item-sender { font-weight: 700; color: var(--text-primary); }
    .msg-item.unread .msg-item-subject { font-weight: 600; color: var(--text-primary); }
    .msg-unread-dot {
      position: absolute; left: 6px; top: 50%; transform: translateY(-50%);
      width: 7px; height: 7px; background: var(--accent); border-radius: 50%;
    }
    .msg-item-sender { font-size: .88rem; color: var(--text-secondary); margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .msg-item-subject { font-size: .85rem; color: var(--text-secondary); margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .msg-item-preview { font-size: .78rem; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .msg-item-time { font-size: .72rem; color: var(--text-muted); position: absolute; top: 14px; right: 14px; }

    /* Empty state */
    .msg-empty {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100%; gap: 12px; color: var(--text-muted);
    }
    .msg-empty svg { opacity: .3; }
    .msg-empty p { font-size: .88rem; }

    /* Message detail */
    .msg-detail {
      flex: 1; display: flex; flex-direction: column; overflow: hidden;
    }
    .msg-detail-placeholder {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 14px; color: var(--text-muted);
    }
    .msg-detail-placeholder svg { opacity: .2; }
    .msg-detail-placeholder p { font-size: .9rem; }

    .msg-detail-content { display: none; flex-direction: column; flex: 1; overflow: hidden; }
    .msg-detail-content.show { display: flex; }

    .msg-detail-toolbar {
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px;
    }
    .toolbar-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 13px; border-radius: var(--radius-sm);
      font-size: .8rem; font-weight: 600;
      border: 1px solid var(--border); color: var(--text-secondary);
      background: none; cursor: pointer; transition: all var(--ease-fast);
    }
    .toolbar-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-glow); }
    .toolbar-btn.danger:hover { border-color: #ef4444; color: #f87171; background: rgba(239,68,68,.08); }
    .toolbar-btn svg { width: 14px; height: 14px; }

    .msg-detail-header {
      padding: 24px 28px 18px;
      border-bottom: 1px solid var(--border);
    }
    .msg-detail-subject { font-size: 1.25rem; font-weight: 700; margin-bottom: 14px; }
    .msg-detail-meta { display: flex; flex-wrap: wrap; gap: 20px; }
    .msg-meta-item { display: flex; flex-direction: column; gap: 2px; }
    .msg-meta-label { font-size: .68rem; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--text-muted); }
    .msg-meta-value { font-size: .88rem; color: var(--text-primary); }
    .msg-meta-email { color: var(--accent); }

    .msg-detail-body {
      flex: 1; overflow-y: auto; padding: 28px;
    }
    .msg-detail-body::-webkit-scrollbar { width: 4px; }
    .msg-detail-body::-webkit-scrollbar-track { background: transparent; }
    .msg-detail-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .msg-body-text {
      font-size: .93rem; line-height: 1.8; color: var(--text-secondary);
      white-space: pre-wrap; max-width: 680px;
    }

    /* Reply hint */
    .reply-hint {
      padding: 16px 28px;
      border-top: 1px solid var(--border);
      background: var(--bg-secondary);
    }
    .reply-hint a {
      display: inline-flex; align-items: center; gap: 8px;
      font-size: .85rem; font-weight: 600; color: var(--accent);
    }
    .reply-hint a:hover { text-decoration: underline; }
    .reply-hint a svg { width: 14px; height: 14px; }

    /* Stats view */
    .stats-view { display: none; flex: 1; padding: 32px; overflow-y: auto; }
    .stats-view.show { display: block; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 20px; margin-bottom: 36px; }
    .stat-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius-md); padding: 22px;
    }
    .stat-label { font-size: .72rem; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; }
    .stat-value { font-size: 2rem; font-weight: 800; color: var(--text-primary); }
    .stat-value.accent { color: var(--accent); }

    /* Toast */
    .toast {
      position: fixed; bottom: 24px; right: 24px;
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius-md); padding: 12px 18px;
      font-size: .85rem; color: var(--text-primary);
      box-shadow: var(--shadow-md); z-index: 9999;
      transform: translateY(20px); opacity: 0;
      transition: all .25s ease;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { border-color: rgba(34,197,94,.35); color: #4ade80; }
    .toast.error   { border-color: rgba(239,68,68,.35);  color: #f87171; }

    /* Responsive */
    @media (max-width: 900px) {
      .sidebar { width: 56px; padding: 12px 6px; }
      .sidebar-link span, .sidebar-section, .sidebar-badge { display: none; }
      .sidebar-link { justify-content: center; padding: 10px; }
      .msg-list { width: 260px; }
    }
    @media (max-width: 640px) {
      .msg-list { width: 100%; }
      .msg-detail { display: none; }
      .msg-list.hidden { display: none; }
      .msg-detail.mobile-show { display: flex !important; }
    }
  </style>
</head>
<body>

  <!-- Top bar -->
  <div class="topbar">
    <div class="topbar-brand">
      Mark<span class="dot">.</span>
      <span class="topbar-badge">Admin</span>
    </div>
    <div class="topbar-right">
      <span class="topbar-user">Signed in as <span id="admin-name">—</span></span>
      <button class="btn-logout" id="logout-btn">Sign Out</button>
    </div>
  </div>

  <!-- Main shell -->
  <div class="shell">

    <!-- Sidebar -->
    <nav class="sidebar">
      <div class="sidebar-section">Manage</div>
      <button class="sidebar-link active" data-view="inbox" id="nav-inbox">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
          <polyline points="22,6 12,13 2,6"/>
        </svg>
        <span>Messages</span>
        <span class="sidebar-badge hidden" id="unread-badge">0</span>
      </button>
      <button class="sidebar-link" data-view="stats" id="nav-stats">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/>
          <line x1="6"  y1="20" x2="6"  y2="14"/>
        </svg>
        <span>Stats</span>
      </button>

      <div class="sidebar-section">Site</div>
      <a class="sidebar-link" href="/" target="_blank">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        <span>View Site</span>
      </a>
    </nav>

    <!-- Content -->
    <div class="content">

      <!-- Inbox view -->
      <div class="inbox-pane" id="view-inbox">
        <!-- Message list -->
        <div class="msg-list" id="msg-list">
          <div class="msg-list-header">
            <h3>Inbox</h3>
            <span class="msg-count" id="msg-count">0 messages</span>
          </div>
          <div class="msg-list-body" id="msg-list-body">
            <div class="msg-empty">
              <svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                <polyline points="22,6 12,13 2,6"/>
              </svg>
              <p>No messages yet</p>
            </div>
          </div>
        </div>

        <!-- Message detail -->
        <div class="msg-detail" id="msg-detail">
          <div class="msg-detail-placeholder" id="detail-placeholder">
            <svg width="56" height="56" fill="none" stroke="currentColor" stroke-width="1.2" viewBox="0 0 24 24">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
              <polyline points="22,6 12,13 2,6"/>
            </svg>
            <p>Select a message to read it</p>
          </div>

          <div class="msg-detail-content" id="detail-content">
            <div class="msg-detail-toolbar">
              <button class="toolbar-btn" id="btn-toggle-read">
                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
                <span id="read-label">Mark as unread</span>
              </button>
              <button class="toolbar-btn danger" id="btn-delete">
                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                  <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/>
                  <path d="M10 11v6M14 11v6M9 6V4h6v2"/>
                </svg>
                Delete
              </button>
            </div>

            <div class="msg-detail-header">
              <div class="msg-detail-subject" id="detail-subject">—</div>
              <div class="msg-detail-meta">
                <div class="msg-meta-item">
                  <div class="msg-meta-label">From</div>
                  <div class="msg-meta-value" id="detail-name">—</div>
                </div>
                <div class="msg-meta-item">
                  <div class="msg-meta-label">Email</div>
                  <div class="msg-meta-value msg-meta-email" id="detail-email">—</div>
                </div>
                <div class="msg-meta-item">
                  <div class="msg-meta-label">Received</div>
                  <div class="msg-meta-value" id="detail-time">—</div>
                </div>
              </div>
            </div>

            <div class="msg-detail-body">
              <div class="msg-body-text" id="detail-body">—</div>
            </div>

            <div class="reply-hint">
              <a id="reply-link" href="#" target="_blank">
                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                  <polyline points="9 17 4 12 9 7"/><path d="M20 18v-2a4 4 0 0 0-4-4H4"/>
                </svg>
                Reply via email client
              </a>
            </div>
          </div>
        </div>
      </div>

      <!-- Stats view -->
      <div class="stats-view" id="view-stats">
        <h2 style="margin-bottom:24px">Overview</h2>
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-label">Total Messages</div>
            <div class="stat-value accent" id="stat-total">—</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Unread</div>
            <div class="stat-value" id="stat-unread">—</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Read</div>
            <div class="stat-value" id="stat-read">—</div>
          </div>
        </div>
        <p style="color:var(--text-muted);font-size:.85rem">More analytics coming soon.</p>
      </div>

    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
    let messages = [];
    let selectedId = null;

    // ── Toast ──────────────────────────────────────────────────────────────
    function toast(msg, type = 'success') {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.className = `toast show ${type}`;
      clearTimeout(el._t);
      el._t = setTimeout(() => el.classList.remove('show'), 3000);
    }

    // ── Auth check ─────────────────────────────────────────────────────────
    async function checkAuth() {
      try {
        const res = await fetch('/api/admin/me');
        if (!res.ok) {
          console.warn('Auth check failed:', res.status);
          window.location.href = '/admin/login';
          return false;
        }
        const d = await res.json();
        document.getElementById('admin-name').textContent = d.username;
        return true;
      } catch (err) {
        console.error('Auth check error:', err);
        window.location.href = '/admin/login';
        return false;
      }
    }

    // ── Logout ─────────────────────────────────────────────────────────────
    document.getElementById('logout-btn').addEventListener('click', async () => {
      await fetch('/api/admin/logout', { method: 'POST' });
      window.location.href = '/admin/login';
    });

    // ── Sidebar nav ────────────────────────────────────────────────────────
    document.querySelectorAll('.sidebar-link[data-view]').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.sidebar-link').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const view = btn.dataset.view;
        document.getElementById('view-inbox').style.display = view === 'inbox' ? 'flex' : 'none';
        document.getElementById('view-stats').classList.toggle('show', view === 'stats');
        if (view === 'stats') loadStats();
      });
    });

    // ── Format date ────────────────────────────────────────────────────────
    function fmtDate(iso) {
      const d = new Date(iso + 'Z');
      const now = new Date();
      const diff = now - d;
      if (diff < 86400000 && d.getDate() === now.getDate()) {
        return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      }
      return d.toLocaleDateString([], { month: 'short', day: 'numeric', year: diff > 31536000000 ? 'numeric' : undefined });
    }

    function fmtDateFull(iso) {
      return new Date(iso + 'Z').toLocaleString([], { dateStyle: 'medium', timeStyle: 'short' });
    }

    // ── Render message list ────────────────────────────────────────────────
    function renderList() {
      const body = document.getElementById('msg-list-body');
      const count = document.getElementById('msg-count');
      const unreadCount = messages.filter(m => !m.is_read).length;
      const badge = document.getElementById('unread-badge');

      count.textContent = `${messages.length} message${messages.length !== 1 ? 's' : ''}`;
      badge.textContent = unreadCount;
      badge.classList.toggle('hidden', unreadCount === 0);

      if (messages.length === 0) {
        body.innerHTML = `<div class="msg-empty">
          <svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg><p>No messages yet</p></div>`;
        return;
      }

      body.innerHTML = messages.map(m => `
        <div class="msg-item ${m.is_read ? '' : 'unread'} ${m.id === selectedId ? 'selected' : ''}"
             data-id="${m.id}" role="button" tabindex="0">
          ${!m.is_read ? '<div class="msg-unread-dot"></div>' : ''}
          <div class="msg-item-time">${fmtDate(m.received)}</div>
          <div class="msg-item-sender">${esc(m.name)}</div>
          <div class="msg-item-subject">${esc(m.subject)}</div>
          <div class="msg-item-preview">${esc(m.message.slice(0, 80))}</div>
        </div>
      `).join('');

      body.querySelectorAll('.msg-item').forEach(el => {
        el.addEventListener('click', () => selectMessage(parseInt(el.dataset.id)));
        el.addEventListener('keydown', e => { if (e.key === 'Enter') selectMessage(parseInt(el.dataset.id)); });
      });
    }

    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ── Select + display message ───────────────────────────────────────────
    async function selectMessage(id) {
      selectedId = id;
      const msg = messages.find(m => m.id === id);
      if (!msg) return;

      renderList();

      document.getElementById('detail-placeholder').style.display = 'none';
      document.getElementById('detail-content').classList.add('show');

      document.getElementById('detail-subject').textContent = msg.subject;
      document.getElementById('detail-name').textContent    = msg.name;
      document.getElementById('detail-email').textContent   = msg.email;
      document.getElementById('detail-time').textContent    = fmtDateFull(msg.received);
      document.getElementById('detail-body').textContent    = msg.message;
      document.getElementById('reply-link').href =
        `mailto:${msg.email}?subject=Re: ${encodeURIComponent(msg.subject)}`;

      updateReadLabel(msg.is_read);

      if (!msg.is_read) {
        await fetch(`/api/admin/messages/${id}/read`, {
          method: 'PATCH', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ is_read: true })
        });
        msg.is_read = 1;
        renderList();
      }
    }

    function updateReadLabel(isRead) {
      document.getElementById('read-label').textContent = isRead ? 'Mark as unread' : 'Mark as read';
    }

    // ── Toolbar actions ────────────────────────────────────────────────────
    document.getElementById('btn-toggle-read').addEventListener('click', async () => {
      if (!selectedId) return;
      const msg = messages.find(m => m.id === selectedId);
      const newVal = msg.is_read ? 0 : 1;
      await fetch(`/api/admin/messages/${selectedId}/read`, {
        method: 'PATCH', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ is_read: !!newVal })
      });
      msg.is_read = newVal;
      updateReadLabel(newVal);
      renderList();
      toast(newVal ? 'Marked as read' : 'Marked as unread');
    });

    document.getElementById('btn-delete').addEventListener('click', async () => {
      if (!selectedId) return;
      if (!confirm('Delete this message? This cannot be undone.')) return;
      await fetch(`/api/admin/messages/${selectedId}`, { method: 'DELETE' });
      messages = messages.filter(m => m.id !== selectedId);
      selectedId = null;
      document.getElementById('detail-content').classList.remove('show');
      document.getElementById('detail-placeholder').style.display = '';
      renderList();
      toast('Message deleted');
    });

    // ── Load messages ──────────────────────────────────────────────────────
    async function loadMessages() {
      try {
        const res = await fetch('/api/admin/messages');
        if (!res.ok) {
          console.error('Messages API returned', res.status, '— redirecting to login');
          window.location.href = '/admin/login';
          return;
        }
        const data = await res.json();
        console.log('Loaded', data.length, 'message(s)');
        messages = data;
        renderList();
      } catch (err) {
        console.error('loadMessages error:', err);
        toast('Failed to load messages — check the console', 'error');
      }
    }

    // ── Load stats ─────────────────────────────────────────────────────────
    async function loadStats() {
      const res = await fetch('/api/admin/stats');
      const d   = await res.json();
      document.getElementById('stat-total').textContent  = d.total;
      document.getElementById('stat-unread').textContent = d.unread;
      document.getElementById('stat-read').textContent   = d.total - d.unread;
    }

    // ── Init ───────────────────────────────────────────────────────────────
    (async () => {
      const authed = await checkAuth();
      if (!authed) return;
      await loadMessages();
      setInterval(loadMessages, 60000);
    })();
  </script>
</body>
</html>

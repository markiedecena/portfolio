<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Setup — Mark Decena</title>
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .auth-wrap { width: 100%; max-width: 420px; padding: 24px; }
    .auth-logo { text-align: center; margin-bottom: 32px; }
    .auth-logo-text { font-size: 1.5rem; font-weight: 800; letter-spacing: -.03em; }
    .auth-logo-text .dot { color: var(--accent); }
    .auth-logo-sub { font-size: .8rem; color: var(--text-muted); margin-top: 4px; letter-spacing: .06em; text-transform: uppercase; }
    .auth-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 36px; }
    .auth-card h2 { font-size: 1.45rem; margin-bottom: 6px; }
    .auth-card .auth-desc { font-size: .88rem; color: var(--text-secondary); margin-bottom: 28px; line-height: 1.6; }
    .setup-badge {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(100,255,218,.08); border: 1px solid rgba(100,255,218,.25);
      color: var(--teal); font-size: .75rem; font-weight: 600; letter-spacing: .06em;
      text-transform: uppercase; padding: 5px 12px; border-radius: 100px; margin-bottom: 20px;
    }
    .setup-badge::before { content: ''; width: 7px; height: 7px; background: var(--teal); border-radius: 50%; }
    .form-hint { font-size: .75rem; color: var(--text-muted); margin-top: 4px; }
    .alert-err {
      display: none; background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.3);
      color: #f87171; font-size: .85rem; padding: 11px 14px; border-radius: var(--radius-sm); margin-bottom: 16px;
    }
    .alert-err.show { display: block; }
    .pw-toggle-wrap { position: relative; }
    .pw-toggle-wrap .form-input { padding-right: 44px; }
    .pw-toggle {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 4px;
      display: flex; align-items: center;
    }
    .pw-toggle:hover { color: var(--text-primary); }
    .strength-bar { height: 3px; border-radius: 2px; background: var(--border); margin-top: 8px; overflow: hidden; }
    .strength-fill { height: 100%; width: 0; border-radius: 2px; transition: width .3s, background .3s; }
  </style>
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-logo">
      <div class="auth-logo-text">Mark<span class="dot">.</span></div>
      <div class="auth-logo-sub">Portfolio Admin</div>
    </div>

    <div class="auth-card">
      <div class="setup-badge">First-time Setup</div>
      <h2>Create Admin Account</h2>
      <p class="auth-desc">
        This is a one-time setup. Create your admin credentials to access the portfolio management panel.
      </p>

      <div id="alert-err" class="alert-err"></div>

      <form id="setup-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="username">Username</label>
          <input id="username" name="username" type="text" class="form-input" placeholder="admin" required autocomplete="username" />
          <span class="form-hint">Used to log in to the admin panel.</span>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <div class="pw-toggle-wrap">
            <input id="password" name="password" type="password" class="form-input" placeholder="Min. 8 characters" required autocomplete="new-password" />
            <button type="button" class="pw-toggle" aria-label="Toggle password visibility" id="pw-eye">
              <svg id="eye-icon" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
        </div>

        <div class="form-group">
          <label class="form-label" for="confirm">Confirm Password</label>
          <div class="pw-toggle-wrap">
            <input id="confirm" name="confirm" type="password" class="form-input" placeholder="Re-enter password" required autocomplete="new-password" />
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-submit" id="submit-btn">
          Create Account
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M9 12l2 2 4-4M21 12c0 4.97-4.03 9-9 9S3 16.97 3 12 7.03 3 12 3s9 4.03 9 9z"/>
          </svg>
        </button>
      </form>
    </div>
  </div>

  <script>
    const pwInput  = document.getElementById('password');
    const eyeBtn   = document.getElementById('pw-eye');
    const fill     = document.getElementById('strength-fill');
    const alertEl  = document.getElementById('alert-err');
    const submitBtn= document.getElementById('submit-btn');

    // Check if admin already exists
    fetch('/api/admin/check-setup')
      .then(r => r.json())
      .then(d => { if (d.setup) window.location.href = '/admin/login'; });

    eyeBtn.addEventListener('click', () => {
      const show = pwInput.type === 'password';
      pwInput.type = show ? 'text' : 'password';
    });

    pwInput.addEventListener('input', () => {
      const v = pwInput.value;
      let score = 0;
      if (v.length >= 8) score++;
      if (/[A-Z]/.test(v)) score++;
      if (/[0-9]/.test(v)) score++;
      if (/[^A-Za-z0-9]/.test(v)) score++;
      const pct   = (score / 4) * 100;
      const color = score <= 1 ? '#ef4444' : score === 2 ? '#f97316' : score === 3 ? '#eab308' : '#22c55e';
      fill.style.width = pct + '%';
      fill.style.background = color;
    });

    function showError(msg) {
      alertEl.textContent = msg;
      alertEl.classList.add('show');
    }

    document.getElementById('setup-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      alertEl.classList.remove('show');
      const username = document.getElementById('username').value.trim();
      const password = pwInput.value;
      const confirm  = document.getElementById('confirm').value;

      if (!username) return showError('Username is required.');
      if (password.length < 8) return showError('Password must be at least 8 characters.');
      if (password !== confirm) return showError('Passwords do not match.');

      submitBtn.disabled = true;
      submitBtn.textContent = 'Creating…';

      try {
        const res  = await fetch('/api/admin/setup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (!res.ok) { showError(data.error || 'Setup failed.'); submitBtn.disabled = false; submitBtn.textContent = 'Create Account'; return; }
        window.location.href = '/admin/login?setup=1';
      } catch {
        showError('Network error. Make sure the server is running.');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Create Account';
      }
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — Mark Decena</title>
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .auth-wrap { width: 100%; max-width: 400px; padding: 24px; }
    .auth-logo { text-align: center; margin-bottom: 32px; }
    .auth-logo-text { font-size: 1.5rem; font-weight: 800; letter-spacing: -.03em; }
    .auth-logo-text .dot { color: var(--accent); }
    .auth-logo-sub { font-size: .8rem; color: var(--text-muted); margin-top: 4px; letter-spacing: .06em; text-transform: uppercase; }
    .auth-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 36px; }
    .auth-card h2 { font-size: 1.45rem; margin-bottom: 6px; }
    .auth-card .auth-desc { font-size: .88rem; color: var(--text-secondary); margin-bottom: 28px; }
    .alert-err {
      display: none; background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.3);
      color: #f87171; font-size: .85rem; padding: 11px 14px; border-radius: var(--radius-sm); margin-bottom: 16px;
    }
    .alert-err.show { display: block; }
    .alert-ok {
      display: none; background: rgba(34,197,94,.08); border: 1px solid rgba(34,197,94,.25);
      color: #4ade80; font-size: .85rem; padding: 11px 14px; border-radius: var(--radius-sm); margin-bottom: 16px;
    }
    .alert-ok.show { display: block; }
    .pw-toggle-wrap { position: relative; }
    .pw-toggle-wrap .form-input { padding-right: 44px; }
    .pw-toggle {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 4px;
      display: flex; align-items: center;
    }
    .pw-toggle:hover { color: var(--text-primary); }
    .back-link { display: block; text-align: center; margin-top: 20px; font-size: .82rem; color: var(--text-muted); }
    .back-link a { color: var(--accent); }
    .back-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-logo">
      <div class="auth-logo-text">Mark<span class="dot">.</span></div>
      <div class="auth-logo-sub">Portfolio Admin</div>
    </div>

    <div class="auth-card">
      <h2>Welcome back</h2>
      <p class="auth-desc">Sign in to manage your portfolio and view messages.</p>

      <div id="alert-ok"  class="alert-ok"></div>
      <div id="alert-err" class="alert-err"></div>

      <form id="login-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="username">Username</label>
          <input id="username" name="username" type="text" class="form-input" placeholder="admin" required autocomplete="username" />
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <div class="pw-toggle-wrap">
            <input id="password" name="password" type="password" class="form-input" placeholder="Your password" required autocomplete="current-password" />
            <button type="button" class="pw-toggle" aria-label="Toggle password" id="pw-eye">
              <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-submit" id="submit-btn">
          Sign In
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4M10 17l5-5-5-5M15 12H3"/>
          </svg>
        </button>
      </form>
    </div>

    <p class="back-link"><a href="/">← Back to portfolio</a></p>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    if (params.get('setup') === '1') {
      const ok = document.getElementById('alert-ok');
      ok.textContent = 'Admin account created! You can now log in.';
      ok.classList.add('show');
    }

    fetch('/api/admin/check-setup').then(r => r.json()).then(d => {
      if (!d.setup) window.location.href = '/admin/setup';
    });

    document.getElementById('pw-eye').addEventListener('click', () => {
      const p = document.getElementById('password');
      p.type = p.type === 'password' ? 'text' : 'password';
    });

    const alertErr = document.getElementById('alert-err');
    const submitBtn = document.getElementById('submit-btn');

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      alertErr.classList.remove('show');
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      if (!username || !password) { alertErr.textContent = 'Please fill in both fields.'; alertErr.classList.add('show'); return; }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Signing in…';

      try {
        const res  = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (!res.ok) {
          alertErr.textContent = data.error || 'Invalid credentials.';
          alertErr.classList.add('show');
          submitBtn.disabled = false;
          submitBtn.textContent = 'Sign In';
          return;
        }
        window.location.href = '/admin/dashboard';
      } catch {
        alertErr.textContent = 'Network error. Make sure the server is running.';
        alertErr.classList.add('show');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
